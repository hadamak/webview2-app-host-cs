<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Node.js プラグインテスト</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    font-size: 13px;
    background: #f5f5f5;
    color: #222;
    padding: 16px;
  }
  .card {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 16px;
    max-width: 600px;
    margin: 0 auto;
  }
  h1 { font-size: 18px; margin-bottom: 16px; }
  h2 { font-size: 14px; margin-bottom: 12px; color: #555; border-bottom: 1px solid #eee; padding-bottom: 8px; }
  .row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  button {
    padding: 6px 16px;
    border: 1px solid #bbb;
    border-radius: 4px;
    background: #fafafa;
    cursor: pointer;
  }
  button:hover { background: #f0f0f0; }
  .result {
    font-family: monospace;
    font-size: 12px;
    background: #f9f9f9;
    border: 1px solid #eee;
    padding: 12px;
    border-radius: 4px;
    white-space: pre-wrap;
    min-height: 40px;
  }
  .nav { margin-top: 16px; text-align: center; }
  a { color: #0078d4; text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="card">
  <h1>Node.js プラグインテスト</h1>
  
  <section>
    <h2>Node.js サイドカー情報</h2>
    <div class="row">
      <button onclick="getNodeVersion()">Node.js バージョン取得</button>
    </div>
    <div class="result" id="res-version">情報を取得していません</div>
  </section>

  <div class="nav">
    <a href="index.html">← トップに戻る</a>
  </div>
</div>

<script src="host.js"></script>
<script>
async function getNodeVersion() {
  const el = document.getElementById('res-version');
  el.textContent = '取得中...';
  
  try {
    const info = await Host.Node.Node.version();
    el.textContent = JSON.stringify(info, null, 2);
  } catch (err) {
    el.textContent = 'エラー: ' + err.message;
    console.error(err);
  }
}
</script>

</body>
</html>
