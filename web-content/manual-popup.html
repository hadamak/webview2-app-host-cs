<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>子ポップアップ確認ページ</title>
    <style>
        :root {
            --bg: #12121b;
            --panel: rgba(20, 28, 43, 0.88);
            --border: rgba(129, 198, 255, 0.18);
            --text: #edf5ff;
            --muted: #91a7bd;
            --accent: #58d0ff;
            --danger: #ff8298;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            font-family: "Segoe UI Variable Text", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top right, rgba(88, 208, 255, 0.16), transparent 30%),
                linear-gradient(160deg, #0c0f17 0%, var(--bg) 54%, #0d1621 100%);
        }

        main {
            width: min(100%, calc(100% - 20px));
            max-width: 820px;
            margin: 0 auto;
            padding: 18px 0 28px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 18px 44px rgba(0, 0, 0, 0.28);
            padding: 18px;
            margin-bottom: 16px;
        }

        h1, h2 {
            margin: 0 0 12px;
        }

        p {
            margin: 0 0 14px;
            line-height: 1.65;
            color: var(--muted);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 14px;
        }

        button {
            appearance: none;
            border: 1px solid rgba(129, 198, 255, 0.18);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            border-radius: 999px;
            padding: 10px 14px;
            font: inherit;
            cursor: pointer;
        }

        button:hover {
            border-color: rgba(88, 208, 255, 0.5);
            background: rgba(88, 208, 255, 0.12);
        }

        button.danger {
            border-color: rgba(255, 130, 152, 0.32);
            color: #ffe0e6;
        }

        label {
            display: inline-flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 14px;
        }

        .status-row {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 14px;
        }

        .status-card {
            padding: 12px 14px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .status-label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            letter-spacing: 0.08em;
            color: var(--muted);
        }

        pre {
            min-height: 220px;
            margin: 0;
            padding: 14px;
            overflow: auto;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(0, 0, 0, 0.3);
            color: #d8e7f5;
            font: 13px/1.55 Consolas, monospace;
            white-space: pre-wrap;
        }

        @media (max-width: 600px) {
            .status-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main>
        <section class="panel">
            <h1>子ポップアップ確認ページ</h1>
            <p>このページは親ウィンドウからの <code>window.open</code> で開かれる想定です。<code>beforeunload</code>、<code>window.close()</code>、通常遷移、タイトル変更をここで試し、親ページ側の連携ログと見比べてください。</p>
            <label>
                <input id="guardToggle" type="checkbox">
                <code>beforeunload</code> 確認を有効にする
            </label>
            <div class="actions">
                <button class="danger" id="closeButton" type="button">window.close() を呼ぶ</button>
                <button id="safeRouteButton" type="button">このページへ通常遷移</button>
                <button id="aboutBlankButton" type="button">about:blank へ</button>
                <button id="titleButton" type="button">タイトル変更</button>
            </div>
            <div class="status-row">
                <div class="status-card">
                    <span class="status-label">セッション</span>
                    <span id="sessionValue"></span>
                </div>
                <div class="status-card">
                    <span class="status-label">可視状態</span>
                    <span id="visibilityValue"></span>
                </div>
            </div>
        </section>

        <section class="panel">
            <h2>子ページログ</h2>
            <pre id="popupLog"></pre>
        </section>
    </main>

    <script>
        const params = new URLSearchParams(location.search);
        const sessionId = params.get("session") || "default";
        const restoreHref = `${location.pathname}?session=${encodeURIComponent(sessionId)}&restored=${Date.now()}`;
        const popupLog = document.getElementById("popupLog");
        const guardToggle = document.getElementById("guardToggle");
        const visibilityValue = document.getElementById("visibilityValue");
        const sessionValue = document.getElementById("sessionValue");
        const popupChannel = new BroadcastChannel("manual-check-popup");

        let beforeUnloadEnabled = false;
        let titleCounter = 1;

        function log(message) {
            const now = new Date().toLocaleTimeString("ja-JP", { hour12: false });
            popupLog.textContent = `[${now}] ${message}\n${popupLog.textContent}`.trimEnd();
            popupChannel.postMessage({
                source: "popup",
                status: `子ポップアップ接続中 (session=${sessionId})`,
                message
            });
        }

        function syncStatus() {
            visibilityValue.textContent = document.visibilityState;
            sessionValue.textContent = sessionId;
        }

        function setGuardEnabled(enabled, reason) {
            beforeUnloadEnabled = enabled;
            guardToggle.checked = enabled;
            if (reason) {
                log(reason);
            }
        }

        function beforeUnloadHandler(event) {
            if (!beforeUnloadEnabled) {
                return;
            }

            log("beforeunload が発火しました");
            event.preventDefault();
            event.returnValue = "";
        }

        function executeCommand(command, detail = {}) {
            switch (command) {
                case "setGuard":
                    setGuardEnabled(Boolean(detail.enabled), `親からの指示で beforeunload ガードを ${detail.enabled ? "有効" : "無効"} にしました`);
                    break;
                case "close":
                    log("親からの指示で window.close() を呼び出します");
                    window.close();
                    break;
                case "safeRoute":
                    if (beforeUnloadEnabled) {
                        setGuardEnabled(false, "通常遷移確認のため beforeunload ガードを一時的に無効化しました");
                    } else {
                        log("親からの指示で通常遷移します");
                    }
                    location.href = restoreHref;
                    break;
                case "changeTitle":
                    titleCounter += 1;
                    document.title = `子ポップアップ確認ページ #${titleCounter}`;
                    log(`親からの指示でタイトルを「${document.title}」に変更しました`);
                    break;
                case "forceAboutBlank":
                    log("親からの指示で about:blank へ遷移します");
                    location.href = "about:blank";
                    break;
                case "ping":
                    log("親から PING を受信しました");
                    break;
                default:
                    break;
            }
        }

        guardToggle.addEventListener("change", () => {
            beforeUnloadEnabled = guardToggle.checked;
            log(`beforeunload ガードを ${beforeUnloadEnabled ? "有効" : "無効"} にしました`);
        });

        document.getElementById("closeButton").addEventListener("click", () => {
            log("window.close() を呼び出しました");
            window.close();
        });

        document.getElementById("safeRouteButton").addEventListener("click", () => {
            if (beforeUnloadEnabled) {
                setGuardEnabled(false, "通常遷移確認のため beforeunload ガードを一時的に無効化しました");
            } else {
                log("このページへ通常遷移します");
            }
            location.href = restoreHref;
        });

        document.getElementById("aboutBlankButton").addEventListener("click", () => {
            log("about:blank へ遷移します");
            location.href = "about:blank";
        });

        document.getElementById("titleButton").addEventListener("click", () => {
            titleCounter += 1;
            document.title = `子ポップアップ確認ページ #${titleCounter}`;
            log(`タイトルを「${document.title}」に変更しました`);
        });

        popupChannel.addEventListener("message", (event) => {
            const data = event.data;
            if (!data || data.target !== "popup") {
                return;
            }

            executeCommand(data.command, data.detail || {});
        });
        popupChannel.start();

        window.addEventListener("beforeunload", beforeUnloadHandler);
        document.addEventListener("visibilitychange", () => {
            syncStatus();
            log(`visibilitychange -> ${document.visibilityState}`);
        });
        window.addEventListener("focus", () => log("window focus"));
        window.addEventListener("blur", () => log("window blur"));
        window.addEventListener("pageshow", () => log("pageshow"));
        window.addEventListener("pagehide", () => log("pagehide"));

        syncStatus();
        log("子ポップアップ確認ページの準備ができました");
        if (location.search.includes("restored=")) {
            log("通常遷移によってこのページへ戻りました");
        }
    </script>
</body>
</html>
