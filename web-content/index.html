<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Standby - WebView2 App Host</title>
    <style>
        /* Base & Reset */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #030305; color: #ffffff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden; /* スクロールバーを隠す */
            user-select: none; /* ネイティブアプリのような操作感 */
        }
        
        /* Canvas Background */
        #bg-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
        }

        /* UI Layer Container */
        .ui-layer {
            position: relative; z-index: 1;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        /* Glassmorphism Dashboard */
        .dashboard {
            background: rgba(20, 20, 30, 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 40px;
            width: 85%; max-width: 640px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            animation: bootSequence 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes bootSequence {
            0% { opacity: 0; transform: scale(0.95) translateY(20px); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        /* Typography */
        h1 {
            margin: 0 0 5px 0; font-size: 24px; font-weight: 400; letter-spacing: 4px;
            background: linear-gradient(90deg, #0078D4, #00C6FF);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 13px; color: #888; margin-bottom: 35px; letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* System Info Grid */
        .info-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 35px;
        }

        .info-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 16px; border-radius: 8px;
            transition: background 0.3s;
        }
        .info-box:hover { background: rgba(255, 255, 255, 0.03); }
        
        .info-label { 
            font-size: 10px; color: #666; text-transform: uppercase; 
            letter-spacing: 1px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
        }
        .info-label::before {
            content: ''; display: inline-block; width: 6px; height: 6px; 
            background: #0078D4; border-radius: 50%;
        }
        .info-value { 
            font-size: 14px; font-family: 'Consolas', monospace; color: #d4d4d4; 
            word-break: break-all; line-height: 1.4;
        }

        /* Buttons */
        .controls { display: flex; gap: 15px; justify-content: flex-end; }

        .utility-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            padding-top: 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .utility-copy {
            font-size: 12px;
            color: #93a1b2;
            line-height: 1.5;
        }

        .utility-copy strong {
            display: block;
            margin-bottom: 4px;
            color: #d8e5f2;
            font-weight: 600;
            letter-spacing: 0.08em;
        }

        button {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff; padding: 10px 24px; border-radius: 6px;
            font-size: 13px; cursor: pointer; transition: all 0.2s;
            font-family: inherit; letter-spacing: 1px;
            outline: none;
        }

        button:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-1px); }
        button:active { transform: translateY(1px); }

        a.button-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        
        .btn-primary { border-color: rgba(0, 120, 212, 0.5); color: #00C6FF; }
        .btn-primary:hover { background: rgba(0, 120, 212, 0.15); box-shadow: 0 0 15px rgba(0, 120, 212, 0.3); }
        
        .btn-danger { border-color: rgba(212, 0, 0, 0.4); color: #ff6b6b; }
        .btn-danger:hover { background: rgba(212, 0, 0, 0.15); box-shadow: 0 0 15px rgba(212, 0, 0, 0.3); }

        /* Clock Widget */
        #clock { 
            position: absolute; top: 25px; right: 35px; 
            font-family: 'Consolas', monospace; font-size: 18px; color: #666; 
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <!-- インタラクティブ背景 -->
    <canvas id="bg-canvas"></canvas>
    
    <!-- UIレイヤー -->
    <div class="ui-layer">
        <div id="clock">00:00:00</div>
        
        <div class="dashboard">
            <h1>NO CONTENT MOUNTED</h1>
            <div class="subtitle">System Standby - Waiting for Web Application</div>
            
            <div class="info-grid">
                <div class="info-box">
                    <div class="info-label">Environment</div>
                    <div class="info-value" id="env-info">Analyzing...</div>
                </div>
                <div class="info-box">
                    <div class="info-label">Viewport</div>
                    <div class="info-value" id="res-info">0 x 0</div>
                </div>
                <div class="info-box" style="grid-column: span 2;">
                    <div class="info-label">Engine Core</div>
                    <div class="info-value" id="ua-info">Analyzing...</div>
                </div>
            </div>

            <div class="controls">
                <!-- READMEに記載された標準Web APIによるネイティブ制御のデモ -->
                <button class="btn-primary" onclick="toggleFullscreen()" id="fs-btn">FULLSCREEN [F11]</button>
                <button class="btn-danger" onclick="window.close()">SHUTDOWN</button>
            </div>

            <div class="utility-bar">
                <div class="utility-copy">
                    <strong>手動確認ページ</strong>
                    終了フロー、`beforeunload`、可視状態イベント、外部遷移、Range 応答を確認できます。
                </div>
                <a class="button-link" href="/manual-check.html">
                    <button type="button" class="btn-primary">確認ページを開く</button>
                </a>
            </div>
        </div>
    </div>

    <script>
        // --- System UI Logic ---
        function updateSystemInfo() {
            const isWebView2 = navigator.userAgent.includes('Edg/');
            document.getElementById('env-info').innerText = isWebView2 ? 'WebView2 Runtime (Native Mode)' : 'Standard Web Browser';
            document.getElementById('res-info').innerText = `${window.innerWidth}px × ${window.innerHeight}px`;
            document.getElementById('ua-info').innerText = navigator.userAgent;
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', { hour12: false });
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.error(err));
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        window.addEventListener('resize', () => {
            updateSystemInfo();
            resizeCanvas();
        });

        document.addEventListener('fullscreenchange', () => {
            const btn = document.getElementById('fs-btn');
            btn.innerText = document.fullscreenElement ? 'EXIT FULLSCREEN [ESC]' : 'FULLSCREEN[F11]';
        });

        setInterval(updateClock, 1000);
        updateClock();
        updateSystemInfo();


        // --- Canvas Particle Network Background ---
        // 外部ライブラリ無しでリッチな視覚効果を生み出す軽量スクリプト
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles =[];
        let mouse = { x: null, y: null, radius: 120 };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        }
        
        // マウスインタラクション
        window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
        window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });

        class Particle {
            constructor(x, y, dx, dy, size) {
                this.x = x; this.y = y; this.dx = dx; this.dy = dy; this.size = size;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = 'rgba(0, 120, 212, 0.4)';
                ctx.fill();
            }
            update() {
                if (this.x > canvas.width || this.x < 0) this.dx = -this.dx;
                if (this.y > canvas.height || this.y < 0) this.dy = -this.dy;

                // マウスカーソルから逃げる・引き寄せられる効果
                if (mouse.x != null) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < mouse.radius) {
                        const force = (mouse.radius - distance) / mouse.radius;
                        this.x -= (dx / distance) * force * 1.5;
                        this.y -= (dy / distance) * force * 1.5;
                    }
                }
                this.x += this.dx;
                this.y += this.dy;
                this.draw();
            }
        }

        function initParticles() {
            particles =[];
            let numberOfParticles = (canvas.width * canvas.height) / 12000;
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 1.5) + 0.5;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let dx = (Math.random() - 0.5) * 0.8;
                let dy = (Math.random() - 0.5) * 0.8;
                particles.push(new Particle(x, y, dx, dy, size));
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, innerWidth, innerHeight);
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
            }
            connectNodes();
        }

        // 近いノード同士を線で結ぶ
        function connectNodes() {
            for (let a = 0; a < particles.length; a++) {
                for (let b = a; b < particles.length; b++) {
                    let dx = particles[a].x - particles[b].x;
                    let dy = particles[a].y - particles[b].y;
                    let distance = dx * dx + dy * dy;
                    
                    if (distance < 15000) {
                        let opacityValue = 1 - (distance / 15000);
                        ctx.strokeStyle = `rgba(0, 198, 255, ${opacityValue * 0.3})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particles[a].x, particles[a].y);
                        ctx.lineTo(particles[b].x, particles[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        resizeCanvas();
        animate();
    </script>
</body>
</html>
