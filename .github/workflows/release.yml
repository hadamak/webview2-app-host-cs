name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: dotnet restore src\WebView2AppHost.csproj

      - name: Build
        run: msbuild src\WebView2AppHost.csproj /p:Configuration=Release /p:Platform=x64

      - name: Package distributable files
        shell: pwsh
        run: |
          $version = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "manual-${{ github.run_number }}" }
          $outDir = "dist/WebView2AppHost-$version-win-x64"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          $base = "src/bin/x64/Release/net472"
          
          # 1. 最小構成の実行ファイル群をコピー (bin フォルダ)
          $binDir = "$outDir/bin"
          New-Item -ItemType Directory -Force -Path $binDir | Out-Null
          Copy-Item "$base/WebView2AppHost.exe" $binDir
          Copy-Item "$base/WebView2AppHost.exe.config" $binDir
          Copy-Item "$base/Microsoft.Web.WebView2.Core.dll" $binDir
          Copy-Item "$base/Microsoft.Web.WebView2.WinForms.dll" $binDir
          Copy-Item "$base/WebView2Loader.dll" $binDir

          # 2. コンテンツを ZIP 化 (pack_zip.py)
          python scripts/pack_zip.py web-content "$outDir/app.zip"

          # 3. EXE と ZIP を連結した単一配布用 EXE を作成 (bundle.py)
          python scripts/bundle.py "$base/WebView2AppHost.exe" "$outDir/app.zip" "$outDir/WebView2AppHost_bundled.exe"

          # 4. ドキュメント・ライセンス類・スクリプト
          Copy-Item "README.md" $outDir
          Copy-Item "LICENSE" $outDir
          Copy-Item "THIRD_PARTY_NOTICES.md" $outDir
          Copy-Item "scripts" $outDir -Recurse

          # ハッシュ生成
          Get-ChildItem -Path $outDir -Include *.exe, *.zip -Recurse | ForEach-Object {
              $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
              "$hash  $($_.Name)" | Out-File "$($_.FullName).sha256" -Encoding ascii
          }

          # 最終的な ZIP パッケージ
          Compress-Archive -Path "$outDir/*" -DestinationPath "$outDir.zip" -Force

          $hash = (Get-FileHash "$outDir.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $(Split-Path -Leaf "$outDir.zip")" | Out-File "$outDir.zip.sha256" -Encoding ascii

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle-${{ github.ref_name || github.sha }}
          path: |
            dist/**/*.exe
            dist/**/*.exe.sha256
            dist/*.zip
            dist/*.sha256

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**/*.exe
            dist/**/*.exe.sha256
            dist/*.zip
            dist/*.sha256
