name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Restore NuGet packages
        run: msbuild src\WebView2AppHost.csproj /t:Restore

      - name: Build
        run: msbuild src\WebView2AppHost.csproj /p:Configuration=Release /p:Platform=x64

      - name: Build Steam DLL
        run: msbuild src-steam\WebView2AppHost.Steam.csproj /p:Configuration=Release /p:Platform=x64

      - name: Build Node DLL
        run: msbuild src-node\WebView2AppHost.Node.csproj /p:Configuration=Release /p:Platform=x64

      - name: Build HostTests
        run: msbuild tests\HostTests\HostTests.csproj "/t:Restore;Build" /p:Configuration=Debug /p:Platform=x64

      - name: Run HostTests
        run: tests\HostTests\bin\x64\Debug\net472\HostTests.exe

      - name: Run steam.js unit tests
        run: node tests/steam-js/steam.test.js

      - name: Package Core
        shell: pwsh
        run: .\tools\package-core.ps1

      - name: Package ExtensionBase
        shell: pwsh
        run: .\tools\package-extension-base.ps1

      - name: Package Steam support
        shell: pwsh
        run: .\tools\package-steam-support.ps1

      - name: Package Node support
        shell: pwsh
        run: .\tools\package-node-support.ps1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ github.ref_name || github.sha }}
          path: |
            dist/*.zip
            dist/*.sha256
            extension-base/*.zip
            extension-base/*.sha256
            steam-support/*.zip
            steam-support/*.sha256
            node-support/*.zip
            node-support/*.sha256

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          files: |
            dist/*.zip
            dist/*.sha256
            extension-base/*.zip
            extension-base/*.sha256
            steam-support/*.zip
            steam-support/*.sha256
            node-support/*.zip
            node-support/*.sha256
