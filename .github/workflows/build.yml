name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v3

    - name: Build Standard
      run: msbuild src\WebView2AppHost.csproj "/t:Restore;Build" /p:Configuration=Release /p:Platform=x64

    - name: Build SecureRelease
      run: msbuild src\WebView2AppHost.csproj "/t:Restore;Build" /p:Configuration=SecureRelease /p:Platform=x64

    - name: Run Standard Tests (Debug)
      run: |
        dotnet test tests\UnitTests\UnitTests.csproj -c Debug
        dotnet test tests\IntegrationTests\IntegrationTests.csproj -c Debug
        dotnet test tests\StressTests\StressTests.csproj -c Debug

    - name: Run SecureTests (SecureRelease)
      run: dotnet test tests\SecureTests\SecureTests.csproj -c SecureRelease

    - name: Run host.js unit tests
      run: node tests/host-js/host.test.js

    - name: Run Loading Order Tests
      shell: pwsh
      run: .\tests\run-loading-order-test.ps1

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: WebView2AppHost-${{ github.sha }}
        path: src\bin\x64\Release\net48\

    - name: Upload secure artifact
      uses: actions/upload-artifact@v7
      with:
        name: WebView2AppHost-Secure-${{ github.sha }}
        path: src\bin\x64\SecureRelease\net48\
