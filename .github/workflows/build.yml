name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      run: msbuild src\WebView2AppHost.csproj /t:Restore

    - name: Build
      run: msbuild src\WebView2AppHost.csproj /p:Configuration=Release /p:Platform=x64

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: WebView2AppHost-${{ github.sha }}
        path: src\bin\x64\Release\
